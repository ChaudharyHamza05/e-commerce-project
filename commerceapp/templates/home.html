<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        /* Main container */
        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
        }

        .btn {
            padding: 10px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div>
        <strong>My App</strong>
    </div>
    <div>
        <span>Welcome, {{ request.user.username }}</span>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="card">
        <h2>Dashboard</h2>
        <p>You are successfully logged in 🎉</p>
    </div>

    <div class="card">
        <h3>Quick Actions</h3>
        <a href="{% url 'createproduct' %}" class="btn">Add Product</a>
        <a href="{% url 'productlist' %}" class="btn">View Products</a>
    </div>

</div>

</body>
</html>
