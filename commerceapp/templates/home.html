<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
        }

        /* LAYOUT */
        .main {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            background: #0f172a;
            color: white;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        /* CONTENT */
        .content {
            margin-left: 250px;
            padding: 30px;
            width: 100%;
        }

        /* TOPBAR */
        .topbar {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
            color: #64748b;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0 0;
        }

        /* ACTION BUTTONS */
        .actions {
            margin-top: 30px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            margin-right: 10px;
            display: inline-block;
        }

        .btn-blue { background: #2563eb; }
        .btn-green { background: #16a34a; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🛒 My Store</h2>

        <a href="#">🏠 Dashboard</a>
        <a href="{% url 'inventory' %}">📦 Inventory</a>
        <a href="{% url 'saleproduct' %}">🛍️ Sales</a>
        <a href="{% url 'purchaseproduct' %}">📥 Purchase</a>
        <a href="{% url 'productlist' %}">📋 Products</a>
        <a href="{% url 'logout' %}">🚪 Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- TOPBAR -->
        <div class="topbar">
            <h3>Dashboard</h3>
            <span>Welcome, {{ request.user.username }}</span>
        </div>

        <!-- STATS CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Products</h3>
                <p>{{ total_products|default:"0" }}</p>
            </div>

            <div class="card">
                <h3>Total Sales</h3>
                <p>{{ total_sales|default:"0" }}</p>
            </div>

            <div class="card">
                <h3>Available Stock</h3>
                <p>{{ total_stock|default:"0" }}</p>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="actions">
            <a href="{% url 'createproduct' %}" class="btn btn-blue">➕ Add Product</a>
            <a href="{% url 'inventory' %}" class="btn btn-green">📊 View Inventory</a>
        </div>

    </div>

</div>

</body>
</html>
