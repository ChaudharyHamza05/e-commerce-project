<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .container {
            width: 70%;
            margin: 40px auto;
        }

        .card {
            display: flex;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            overflow: hidden;
        }

        .image {
            width: 50%;
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details {
            padding: 20px;
            width: 50%;
        }

        .price {
            color: green;
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn-danger {
            background: red;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><strong>My Store</strong></div>
    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'productlist' %}">Products</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="card">

        <!-- Image -->
        <div class="image">
            {% if product.picture %}
                <img src="{{ product.picture.url }}">
            {% else %}
                <img src="https://placeholder.co/400">
            {% endif %}
        </div>

        <!-- Details -->
        <div class="details">
            <h2>{{ product.name }}</h2>
            <p class="price">Rs. {{ product.price }}</p>

            {% if product.description %}
                <p>{{ product.description }}</p>
            {% endif %}

            <a href="#" class="btn">Edit</a>
            <a href="#" class="btn btn-danger">Delete</a>

            <br><br>
            <a href="{% url 'productlist' %}">← Back to Products</a>
        </div>

    </div>

</div>

</body>
</html>
