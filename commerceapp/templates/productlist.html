<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dfe9f3);
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background: #1f2937;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar strong {
            font-size: 20px;
            letter-spacing: 1px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-weight: 500;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #38bdf8;
        }

        /* CONTAINER */
        .container {
            width: 80%;
            margin: 50px auto;
        }

        /* CARD */
        .card {
            display: flex;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* IMAGE */
        .image {
            width: 50%;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image img {
            width: 100%;
            height: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 10px;
        }

        /* DETAILS */
        .details {
            padding: 30px;
            width: 50%;
        }

        .details h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #111827;
        }

        .price {
            color: #16a34a;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .details p {
            color: #4b5563;
            line-height: 1.6;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
            margin-right: 10px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #374151;
            text-decoration: none;
        }

        .back-link:hover {
            color: #111827;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .card {
                flex-direction: column;
            }

            .image, .details {
                width: 100%;
            }

            .image img {
                max-height: 300px;
            }
        }

    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><strong>My Store</strong></div>
    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'createproduct' %}">Add Product</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="top-bar">
        <h2>All Products</h2>
    </div>

    <div class="grid">
        {% for p in product %}
        <div class="card">
            <img src={{ p.picture.url }} alt="{{ p.name }}"/>

            <div class="card-body">
                <h3>{{ p.name }}</h3>
                <p class="price">Rs. {{ p.price }}</p>

                <a href="{% url 'productdetail' p.id %}" class="btn">View</a>
            </div>

        </div>
        {% empty %}
            <p>No products available</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
