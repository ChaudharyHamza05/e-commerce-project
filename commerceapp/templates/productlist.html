<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        /* Container */
        .container {
            padding: 20px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        .top-bar {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><strong>My Store</strong></div>
    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'createproduct' %}">Add Product</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="top-bar">
        <h2>All Products</h2>
    </div>

    <div class="grid">
        {% for p in product %}
        <div class="card">
            <img src={{ p.picture.url }} alt="{{ p.name }}"/>

            <div class="card-body">
                <h3>{{ p.name }}</h3>
                <p class="price">Rs. {{ p.price }}</p>

                <a href="{% url 'productdetail' p.id %}" class="btn">View</a>
            </div>

        </div>
        {% empty %}
            <p>No products available</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
