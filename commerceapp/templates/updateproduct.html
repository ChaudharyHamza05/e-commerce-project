<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dfe9f3);
            margin: 0;
        }

        /* CONTAINER */
        .container {
            width: 420px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .container:hover {
            transform: translateY(-3px);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #111827;
            font-size: 26px;
        }

        /* FORM FIELDS */
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59,130,246,0.3);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #d97706;
        }

        /* IMAGE PREVIEW */
        img {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* BACK LINK */
        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #374151;
            text-decoration: none;
            font-weight: 500;
        }

        .back:hover {
            color: #111827;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>✏️ Update Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Update Product</button>
    </form>

    <a class="back" href="{% url 'productlist' %}">← Back to Products</a>

</div>

</body>
</html>
